services:
  mysql-datasource:
    image: mysql:8
    container_name: mysql-datasource
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Password@123}
      MYSQL_DATABASE: overseer
      MYSQL_USER: ${MYSQL_USERNAME:-overseer}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Password@123}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - overseer

  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    command: redis-server --requirepass "${REDIS_PASSWORD:-Password@123}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - overseer

  backend-application:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: backend-application
    ports:
      - "8080:8080"
    depends_on:
      mysql-datasource:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    environment:
      MYSQL_URL: jdbc:mysql://mysql-datasource:3306/overseer
      MYSQL_USERNAME: ${MYSQL_USERNAME:-overseer}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Password@123}
      REDIS_HOSTNAME: redis-cache
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-Password@123}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-here}
    networks:
      - overseer
    restart: on-failure:5

networks:
  overseer:
