server:
  port: 8080
spring:
  application:
    name: overseer
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/overseer}
    username: ${MYSQL_USERNAME:overseer}
    password: ${MYSQL_PASSWORD:Password@123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOSTNAME:127.0.0.1}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:Password@123}
  jackson:
    deserialization:
      fail-on-unknown-properties: true
    
com:
  behl:
    overseer:
      token:
        secret-key: ${JWT_SECRET_KEY:your-secret-key-here}
        validity: 120
      open-api:
        enabled: true
        api-version: 1.0.0
        title: Overseer
        description: Backend application imposing rate limit on private API endpoints using token bucket algorithm